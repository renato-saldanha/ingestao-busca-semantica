services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres_rag_mba  
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag-mba
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag-mba"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bootstrap_vector_ext:
    image: pgvector/pgvector:pg17
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts/bootstrap-vector.sh:/bootstrap-vector.sh
    entrypoint: ["/bin/sh", "/bootstrap-vector.sh"]
    restart: "no"

volumes:
  postgres_data: